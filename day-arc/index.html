// ---------- CROSS-DEVICE STORAGE SHIM ----------
// Replaces the in-app window.storage (which only works inside claude.ai artifacts)
// with calls to our own /api/kv serverless function backed by Vercel KV,
// so the same passphrase pulls the same data on any device.
const PIN_STORAGE_KEY = 'dayarc_pin';

function getPin() { return localStorage.getItem(PIN_STORAGE_KEY) || ''; }

async function kvRequest(method, params, body) {
  const pin = getPin();
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(`/api/kv?${qs}`, {
    method,
    headers: {
      'Content-Type': 'application/json',
      'x-pin': pin
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error(`storage ${method} failed: ${res.status}`);
  return res.json();
}

window.storage = {
  async get(key, shared = false) {
    return kvRequest('GET', { key, shared: String(shared) });
  },
  async set(key, value, shared = false) {
    return kvRequest('POST', { shared: String(shared) }, { key, value });
  },
  async delete(key, shared = false) {
    return kvRequest('DELETE', { key, shared: String(shared) });
  },
  async list(prefix = '', shared = false) {
    return kvRequest('GET', { list: 'true', prefix, shared: String(shared) });
  }
};

function initPinGate() {
  return new Promise((resolve) => {
    const overlay = document.getElementById('pinOverlay');
    const input = document.getElementById('pinInput');
    const submit = document.getElementById('pinSubmit');
    const errorEl = document.getElementById('pinError');

    const existing = getPin();
    if (existing) {
      overlay.style.display = 'none';
      resolve();
      return;
    }

    submit.addEventListener('click', () => {
      const val = input.value.trim();
      if (val.length < 4) {
        errorEl.textContent = 'Use at least 4 characters.';
        return;
      }
      localStorage.setItem(PIN_STORAGE_KEY, val);
      overlay.style.display = 'none';
      resolve();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submit.click();
    });
    input.focus();
  });
}

const BIWEEKLY_ANCHOR = new Date(2026, 6, 19); // July 19, 2026
const BIWEEKLY_TASKS = [
  {id:'bw_nails', label:'Nail cutting'},
  {id:'bw_scooty', label:'Scooty cleaning'},
  {id:'bw_disinfect', label:'Disinfect razors/hygiene items', note:'warm water, 10 min'},

];
const MONTHLY_TASKS = [
  {id:'mo_earwax', label:'Clean ear wax'},
  {id:'mo_devices', label:'Devices cleaning'},
  {id:'mo_accounts', label:'Account cleaning / socials'},
  {id:'mo_room', label:'Room cleaning'},

function stripTime(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }

function biweeklyCycleInfo(d) {
  const today = stripTime(d);
  const anchor = stripTime(BIWEEKLY_ANCHOR);
  const diffDays = Math.round((today - anchor) / 86400000);
  if (diffDays < 0) return { isDue: false, cycleNum: -1, daysUntil: -diffDays };
  const cycleNum = Math.floor(diffDays / 14);
  const isDue = diffDays % 14 === 0;
  const daysUntil = isDue ? 0 : (14 - (diffDays % 14));
  return { isDue, cycleNum, daysUntil };
}

function weeklyCycleInfo(d) {
  const today = stripTime(d);
  const isDue = today.getDay() === 0;
  const daysUntil = isDue ? 0 : (7 - today.getDay());
  // ISO-ish week key: use the date of the Sunday this task belongs to
  const sunday = new Date(today);
  sunday.setDate(today.getDate() - today.getDay());
  const weekKey = sunday.toISOString().slice(0,10);
  return { isDue, daysUntil, weekKey };
}

function firstSundayOfMonth(year, month) {
  const d = new Date(year, month, 1);
  const offset = (7 - d.getDay()) % 7;
  return new Date(year, month, 1 + offset);
}

function monthlyCycleInfo(d) {
  const today = stripTime(d);
  const fs = stripTime(firstSundayOfMonth(d.getFullYear(), d.getMonth()));
  const isDue = today.getTime() === fs.getTime();
  let daysUntil = 0;
  if (!isDue) {
    if (today < fs) {
      daysUntil = Math.round((fs - today) / 86400000);
    } else {
      const nextFs = stripTime(firstSundayOfMonth(d.getMonth() === 11 ? d.getFullYear()+1 : d.getFullYear(), (d.getMonth()+1) % 12));
      daysUntil = Math.round((nextFs - today) / 86400000);
    }
  }
  return { isDue, daysUntil, monthKey: `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}` };
}

async function loadCycleState(key) {
  try {
    const res = await window.storage.get(key, false);
    return res && res.value ? JSON.parse(res.value) : {};
  } catch (e) { return {}; }
}

async function saveCycleState(key, obj) {
  try { await window.storage.set(key, JSON.stringify(obj), false); }
  catch (e) { storageOk = false; }
}

let cycleState = {};

async function renderCyclesTab(d) {
  const bw = biweeklyCycleInfo(d);
  const wk = weeklyCycleInfo(d);
  const mo = monthlyCycleInfo(d);
  let html = '';

  if (bw.isDue) {
    const key = `biweekly:${bw.cycleNum}`;
    if (!(key in cycleState)) cycleState[key] = await loadCycleState(key);
    const localState = cycleState[key] || {};
    html += `<div class="day-badge" style="background:#E86A5C22; color:#E86A5C; border:1px solid #E86A5C55;">Bi-weekly — due today</div>`;
    html += `<div class="section active"><div class="section-head"><div class="section-title">Bi-weekly Tasks</div></div><div class="items">`;
    BIWEEKLY_TASKS.forEach(item => {
      const done = !!localState[item.id];
      html += `<div class="item ${done?'done':''}" data-cycle="biweekly" data-ckey="${key}" data-id="${item.id}">
        <div class="box"></div><span class="label">${item.label}</span>${item.note?`<span class="note">${item.note}</span>`:''}</div>`;
    });
    html += `</div></div>`;
  } else {
    html += `<div class="level-detail">Bi-weekly tasks next due in <b>${bw.daysUntil}</b> day(s)${bw.cycleNum < 0 ? ' (starts July 19, 2026)' : ''}.</div>`;
  }

  if (wk.isDue) {
    const key = `weekly:${wk.weekKey}`;
    if (!(key in cycleState)) cycleState[key] = await loadCycleState(key);
    const localState = cycleState[key] || {};
    html += `<div class="day-badge" style="background:#6C8FC722; color:#6C8FC7; border:1px solid #6C8FC755;">Weekly — every Sunday</div>`;
    html += `<div class="section active"><div class="section-head"><div class="section-title">Weekly Tasks</div></div><div class="items">`;
    WEEKLY_TASKS.forEach(item => {
      const done = !!localState[item.id];
      html += `<div class="item ${done?'done':''}" data-cycle="weekly" data-ckey="${key}" data-id="${item.id}">
        <div class="box"></div><span class="label">${item.label}</span>${item.note?`<span class="note">${item.note}</span>`:''}</div>`;
    });
    html += `</div></div>`;
  } else {
    html += `<div class="level-detail">Weekly tasks next due in <b>${wk.daysUntil}</b> day(s) — every Sunday.</div>`;
  }

  if (mo.isDue) {
    const key = `monthly:${mo.monthKey}`;
    if (!(key in cycleState)) cycleState[key] = await loadCycleState(key);
    const localState = cycleState[key] || {};
    html += `<div class="day-badge" style="background:#E8A33D22; color:#E8A33D; border:1px solid #E8A33D55;">Monthly — first Sunday</div>`;
    html += `<div class="section active"><div class="section-head"><div class="section-title">Monthly Tasks</div></div><div class="items">`;
    MONTHLY_TASKS.forEach(item => {
      const done = !!localState[item.id];
      html += `<div class="item ${done?'done':''}" data-cycle="monthly" data-ckey="${key}" data-id="${item.id}">
        <div class="box"></div><span class="label">${item.label}</span>${item.note?`<span class="note">${item.note}</span>`:''}</div>`;
    });
    html += `</div></div>`;
  } else {
    html += `<div class="level-detail">Monthly tasks next due in <b>${mo.daysUntil}</b> day(s) — first Sunday of the month.</div>`;
  }

  return html;
}

let state = {};
let settings = { level: 1 };
let customTasks = []; // kept for storage backward-compat, unused in UI now
let storageOk = true;
let activeTab = 'routine';

const EXTRAS_KEY = 'extras_persistent';
const GOAL_LISTS = {
  weekly: { key: 'weekly_goals_persistent', data: [] },
  monthly: { key: 'monthly_goals_persistent', data: [] },
};
const CONVO_KEY = 'convo_link';
let convoLink = '';

async function loadAll() {
  const key = todayKey(new Date());
  try {
    const res = await window.storage.get(key, false);
    state = res && res.value ? JSON.parse(res.value) : {};
  } catch (e) { state = {}; }
  try {
    const res = await window.storage.get(SETTINGS_KEY, false);
    settings = res && res.value ? JSON.parse(res.value) : { level: 1 };
  } catch (e) { settings = { level: 1 }; }
  try {
    const res = await window.storage.get(GOAL_LISTS.weekly.key, false);
    GOAL_LISTS.weekly.data = res && res.value ? JSON.parse(res.value) : [];
  } catch (e) { GOAL_LISTS.weekly.data = []; }
  try {
    const res = await window.storage.get(GOAL_LISTS.monthly.key, false);
    GOAL_LISTS.monthly.data = res && res.value ? JSON.parse(res.value) : [];
  } catch (e) { GOAL_LISTS.monthly.data = []; }
  try {
    const res = await window.storage.get(CONVO_KEY, false);
    convoLink = res && res.value ? res.value : '';
  } catch (e) { convoLink = ''; }
}

async function saveState() {
  const key = todayKey(new Date());
  try { await window.storage.set(key, JSON.stringify(state), false); }
  catch (e) { storageOk = false; }
}

async function saveSettings() {
  try { await window.storage.set(SETTINGS_KEY, JSON.stringify(settings), false); }
  catch (e) { storageOk = false; }
}

async function saveGoalList(kind) {
  try { await window.storage.set(GOAL_LISTS[kind].key, JSON.stringify(GOAL_LISTS[kind].data), false); }
  catch (e) { storageOk = false; }
}

async function saveConvoLink() {
  try { await window.storage.set(CONVO_KEY, convoLink, false); }
  catch (e) { storageOk = false; }
}

function minsNow() { const d = new Date(); return d.getHours()*60 + d.getMinutes(); }

function toggle(id) { state[id] = !state[id]; saveState(); render(); }

function fmtTime(mins) {
  const h = Math.floor(mins/60), m = mins%60;
  const ampm = h < 12 ? 'AM' : 'PM';
  const h12 = h % 12 === 0 ? 12 : h % 12;
  return `${h12}:${m.toString().padStart(2,'0')} ${ampm}`;
}

function itemRow(item) {
  const done = !!state[item.id];
  return `<div class="item ${done?'done':''}" data-id="${item.id}">
    <div class="box"></div>
    <span class="label">${item.label}</span>
    ${item.note ? `<span class="note">${item.note}</span>` : ''}
  </div>`;
}

function sectionBlock(sec, now) {
  const isActive = now >= sec.start && now < sec.end;
  return `<div class="section ${isActive?'active':''}">
    <div class="section-head">
      <div class="section-title">${sec.title}</div>
      <div class="section-time">${fmtTime(sec.start)}–${fmtTime(sec.end)} ${isActive?'<span class="now-tag">Now</span>':''}</div>
    </div>
    <div class="items">${sec.items.map(itemRow).join('')}</div>
  </div>`;
}

function renderRoutineTab(d, now) {
  let secs = routineSections(d);
  return secs.map(s => sectionBlock(s, now)).join('');
}

function renderWorkoutTab(d) {
  const dow = d.getDay();
  const w = WORKOUTS[dow];
  let html = `<div class="day-badge" style="background:${w.color}22; color:${w.color}; border:1px solid ${w.color}55;">${DAY_NAMES[dow]} — ${w.label}</div>`;

  html += `<div class="level-row">`;
  LEVELS.forEach(l => {
    html += `<div class="level-btn ${settings.level===l.n?'sel':''}" data-level="${l.n}">Level ${l.n}</div>`;
  });
  html += `</div>`;
  const lvl = LEVELS.find(l => l.n === settings.level) || LEVELS[0];
  html += `<div class="level-detail"><b>${lvl.range}</b> — ${lvl.detail}</div>`;

  html += sectionBlock({ id:'warmup', title:'Warm-up (5–10 min)', start:0, end:0, items: WARMUP }, -1);
  html += sectionBlock({ id:'mobility', title:'Morning Mobility (10–15 min)', start:0, end:0, items: MORNING_MOBILITY }, -1);
  html += sectionBlock({ id:'main', title:`Today: ${w.label}`, start:0, end:0, items: w.items }, -1);
  return html;
}

function renderNutritionTab(now, d) {
  return nutritionSections(d).map(s => sectionBlock(s, now)).join('');
}

function renderGoalTab(kind) {
  const list = GOAL_LISTS[kind].data;
  const title = kind === 'weekly' ? 'Weekly Goals' : 'Monthly Goals';
  let html = `<div class="add-box">
    <div class="hint">Paste your ${title.toLowerCase()} (one per line). Set a category — it applies to this batch. This list persists — it does not auto-clear; check things off or delete them yourself.</div>
    <input type="text" id="categoryInput" placeholder="Category (e.g. Work, Errand, Health) — optional">
    <textarea id="customInput" placeholder="e.g.&#10;Finish assignment&#10;Call the electrician"></textarea>
    <button class="add-btn" id="addCustomBtn">Add tasks</button>
  </div>`;
  if (list.length === 0) {
    html += `<div class="empty-note">No ${title.toLowerCase()} added yet.</div>`;
  } else {
    const groups = {};
    list.forEach(t => {
      const cat = t.category || 'General';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(t);
    });
    Object.keys(groups).forEach(cat => {
      html += `<div class="section active"><div class="section-head"><div class="section-title">${cat}</div></div><div class="items">`;
      groups[cat].forEach(t => {
        html += `<div class="item ${t.done?'done':''}" data-goalkind="${kind}" data-cid="${t.id}">
          <div class="box"></div><span class="label">${t.label}</span>
          <span class="del-btn" data-deltype="${kind}" data-delid="${t.id}">×</span>
        </div>`;
      });
      html += `</div></div>`;
    });
  }
  return html;
}

function addGoalTasks(kind, text, category) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) return;
  lines.forEach(l => {
    GOAL_LISTS[kind].data.push({ id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2,7), label: l, done: false, category: (category || '').trim() || 'General' });
  });
  saveGoalList(kind);
  render();
}

function toggleGoalTask(kind, id) {
  const t = GOAL_LISTS[kind].data.find(x => x.id === id);
  if (t) t.done = !t.done;
  saveGoalList(kind);
  render();
}

function deleteGoalTask(kind, id) {
  GOAL_LISTS[kind].data = GOAL_LISTS[kind].data.filter(x => x.id !== id);
  saveGoalList(kind);
  render();
}

function renderConvoTab() {
  const safeLink = convoLink ? convoLink.replace(/"/g, '&quot;') : '';
  let html = `<div class="add-box">
    <div class="hint">Paste the link to your other Claude conversation (where you get the daily task list). Saved permanently, editable anytime.</div>
    <input type="text" id="convoLinkInput" placeholder="https://claude.ai/chat/..." value="${safeLink}">
    <button class="add-btn" id="saveConvoBtn">Save link</button>
  </div>`;
  if (convoLink) {
    html += `<div class="section active"><div class="section-head"><div class="section-title">Your conversation</div>
      <a href="${safeLink}" target="_blank" rel="noopener" style="color:var(--dawn); font-size:12.5px; text-decoration:none;">Open in new tab ↗</a>
    </div></div>`;
    html += `<div class="empty-note">Note: most chat sites (including claude.ai) block being embedded inline for security reasons, so a live preview usually won't render here — the link above opens it directly instead.</div>`;
    html += `<iframe src="${safeLink}" style="width:100%; height:480px; border:1px solid var(--line); border-radius:14px; margin-top:8px; background:rgba(243,238,227,0.02);" loading="lazy"></iframe>`;
  } else {
    html += `<div class="empty-note">No link saved yet.</div>`;
  }
  return html;
}

async function render() {
  const now = minsNow();
  const d = new Date();
  document.getElementById('dateLabel').textContent = d.toLocaleDateString(undefined, {weekday:'long', month:'long', day:'numeric'});

  let html = '';
  if (activeTab === 'routine') html = renderRoutineTab(d, now);
  else if (activeTab === 'workout') html = renderWorkoutTab(d);
  else if (activeTab === 'nutrition') html = renderNutritionTab(now, d);
  else if (activeTab === 'weeklygoals') html = renderGoalTab('weekly');
  else if (activeTab === 'monthlygoals') html = renderGoalTab('monthly');
  else if (activeTab === 'convo') html = renderConvoTab();
  else html = await renderCyclesTab(d);

  document.getElementById('tabContent').innerHTML = html;

  document.querySelectorAll('.item').forEach(el => {
    if (el.dataset.cycle) {
      el.addEventListener('click', () => {
        const key = el.dataset.ckey, id = el.dataset.id;
        if (!cycleState[key]) cycleState[key] = {};
        cycleState[key][id] = !cycleState[key][id];
        saveCycleState(key, cycleState[key]);
        render();
      });
    } else if (el.dataset.goalkind) {
      el.addEventListener('click', (e) => {
        if (e.target.classList.contains('del-btn')) return;
        toggleGoalTask(el.dataset.goalkind, el.dataset.cid);
      });
    } else {
      el.addEventListener('click', () => toggle(el.dataset.id));
    }
  });
  document.querySelectorAll('.del-btn').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const kind = el.dataset.deltype;
      if (kind === 'weekly' || kind === 'monthly') deleteGoalTask(kind, el.dataset.delid);
    });
  });
  const addBtn = document.getElementById('addCustomBtn');
  if (addBtn) {
    addBtn.addEventListener('click', () => {
      const ta = document.getElementById('customInput');
      const cat = document.getElementById('categoryInput');
      const kind = activeTab === 'weeklygoals' ? 'weekly' : 'monthly';
      addGoalTasks(kind, ta.value, cat ? cat.value : '');
    });
  }
  const saveConvoBtn = document.getElementById('saveConvoBtn');
  if (saveConvoBtn) {
    saveConvoBtn.addEventListener('click', () => {
      const inp = document.getElementById('convoLinkInput');
      convoLink = (inp.value || '').trim();
      saveConvoLink();
      render();
    });
  }
  document.querySelectorAll('.level-btn').forEach(el => {
    el.addEventListener('click', () => {
      settings.level = parseInt(el.dataset.level, 10);
      saveSettings();
      render();
    });
  });

  // streak / progress across whatever the current tab's items are
  let totalItems = 0, doneItems = 0;
  document.querySelectorAll('.item').forEach(el => {
    totalItems++;
    if (el.dataset.cycle) {
      const s = cycleState[el.dataset.ckey] || {};
      if (s[el.dataset.id]) doneItems++;
    } else if (el.dataset.goalkind) {
      const t = GOAL_LISTS[el.dataset.goalkind].data.find(x => x.id === el.dataset.cid);
      if (t && t.done) doneItems++;
    } else if (state[el.dataset.id]) {
      doneItems++;
    }
  });
  const pct = totalItems ? Math.round((doneItems/totalItems)*100) : 0;
  document.getElementById('streakRow').innerHTML = `
    <div class="streak-pill"><b>${doneItems}/${totalItems}</b> done</div>
    <div class="streak-pill"><b>${pct}%</b> complete</div>
    ${!storageOk ? '<div class="streak-pill">Saving offline — check may not persist</div>' : ''}
  `;
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeTab = t.dataset.tab;
    render();
  });
});

document.getElementById('resetBtn').addEventListener('click', async () => {
  state = {};
  await saveState();
  render();
});

(async () => {
  await initPinGate();
  await loadAll();
  render();
  setInterval(render, 60000);
})();
</script>
